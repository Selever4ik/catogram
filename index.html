<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🐱 Catogram</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121214">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
    
    <style>
        :root {
            --bg: #121214;
            --bg-panel: #1a1a24;
            --bg-input: #252530;
            --bubble: #2a2a3c;
            --bubble-own: #4a4a6a;
            --accent: #7c8cf8;
            --accent-hover: #6b7be0;
            --green: #4caf84;
            --red: #f04747;
            --yellow: #f0c040;
            --text: #e8e8f0;
            --muted: #9696a8;
            --shadow: 0 4px 20px rgba(0,0,0,0.6);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Chat background */
            --chat-bg: #121214;
            --chat-bg-image: none;
            --chat-bg-size: cover;
            --chat-bg-position: center;
            --chat-bg-opacity: 0.3;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100dvh; 
            display: flex; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInLeft { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        @keyframes recording { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes ripple { to { transform: scale(4); opacity: 0; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(20px); opacity: 0; } }
        @keyframes callPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 132, 0.6); } 50% { box-shadow: 0 0 0 20px rgba(76, 175, 132, 0); } }
        
        .anim-fade { animation: fadeInUp 0.35s ease both; }
        .anim-slide { animation: slideInRight 0.3s ease both; }
        .anim-shake { animation: shake 0.4s ease; }
        .recording { animation: recording 1.2s infinite; }
        .call-pulse { animation: callPulse 1.5s infinite; }
        
        .ripple { position: relative; overflow: hidden; }
        .ripple::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            width: 100px; height: 100px;
            margin-top: -50px; margin-left: -50px;
            top: 50%; left: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: var(--bg-panel);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            box-shadow: var(--shadow);
            animation: toastIn 0.3s ease;
            pointer-events: auto;
            white-space: nowrap;
        }
        .toast.hiding { animation: toastOut 0.3s ease forwards; }

        /* Auth */
        #auth-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            z-index: 100;
            flex-direction: column;
        }
        .auth-box {
            background: var(--bg-panel);
            padding: 35px 30px;
            border-radius: var(--radius);
            width: 370px;
            max-width: 90%;
            box-shadow: var(--shadow);
            text-align: center;
            animation: fadeInUp 0.4s ease;
        }
        .auth-box h2 { margin-bottom: 22px; color: var(--accent); font-size: 28px; letter-spacing: 1px; }
        .input-group { margin-bottom: 14px; position: relative; }
        .input-group input {
            width: 100%;
            padding: 13px 14px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text);
            font-size: 15px;
            outline: 2px solid transparent;
            transition: all var(--transition);
        }
        .input-group input:focus { outline-color: var(--accent); background: #2a2a38; }
        .status-msg {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            display: none;
            pointer-events: none;
        }
        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 10px;
            transition: all var(--transition);
            letter-spacing: 0.5px;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bubble-own); color: #fff; }
        .error-text { color: var(--red); font-size: 13px; min-height: 18px; margin-bottom: 8px; }

        /* App Layout */
        #app-screen { display: none; width: 100%; height: 100%; position: relative; }

        /* Sidebar */
        .sidebar {
            width: 340px;
            min-width: 340px;
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
            transition: transform var(--transition);
        }
        .sidebar-header {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; }
        .avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            overflow: hidden;
            flex-shrink: 0;
            transition: transform var(--transition);
        }
        .avatar:active { transform: scale(0.9); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-sm { width: 36px; height: 36px; font-size: 16px; }
        .avatar-xs { width: 28px; height: 28px; font-size: 12px; }
        
        .sidebar-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .sidebar-tab {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            transition: all var(--transition);
            border-bottom: 2px solid transparent;
        }
        .sidebar-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        
        .search-box { padding: 10px 12px; position: relative; }
        .search-box input {
            width: 100%;
            padding: 11px 14px 11px 38px;
            border-radius: 22px;
            border: none;
            background: var(--bg-input);
            color: var(--text);
            outline: none;
            font-size: 14px;
            transition: all var(--transition);
        }
        .search-box input:focus { background: #2a2a38; }
        .search-box .icon { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
        
        .chat-list { flex: 1; overflow-y: auto; padding: 4px 6px; }
        .chat-list::-webkit-scrollbar { width: 4px; }
        .chat-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        
        .chat-item {
            padding: 10px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: var(--radius-sm);
            transition: all var(--transition);
            margin-bottom: 1px;
            animation: fadeInUp 0.3s ease both;
            position: relative;
        }
        .chat-item:hover { background: rgba(255,255,255,0.04); }
        .chat-item.active { background: var(--accent); }
        .chat-item.active .chat-sub { color: rgba(255,255,255,0.7); }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
        .favorite-star {
            color: var(--yellow);
            font-size: 14px;
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
            transition: transform var(--transition);
        }
        .favorite-star:hover { transform: scale(1.3); }
        .status-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 3px; flex-shrink: 0; }
        .status-online { background: var(--green); }
        .status-offline { background: #555; }

        /* Chat Area */
        .chat-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: var(--chat-bg);
            background-image: var(--chat-bg-image);
            background-size: var(--chat-bg-size);
            background-position: var(--chat-bg-position);
            min-width: 0;
            position: relative;
        }
        .chat-area::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--chat-bg);
            opacity: var(--chat-bg-opacity);
            pointer-events: none;
            z-index: 0;
        }
        .chat-header {
            padding: 12px 16px;
            background: var(--bg-panel);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            min-height: 60px;
            gap: 10px;
            position: relative;
            z-index: 1;
        }
        .chat-header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .back-btn { display: none; background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 5px; }
        .header-btns { display: flex; gap: 5px; }
        .icon-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all var(--transition);
            width: 38px; height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
        .icon-btn.active { color: var(--accent); }

        .messages-container {
            flex: 1;
            padding: 12px 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
            position: relative;
            z-index: 1;
        }
        .messages-container::-webkit-scrollbar { width: 5px; }
        .messages-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
        
        .msg-wrapper { display: flex; flex-direction: column; animation: fadeInUp 0.25s ease both; }
        .msg-wrapper.own { align-items: flex-end; }
        .msg-bubble {
            max-width: 78%;
            padding: 9px 14px;
            border-radius: 16px;
            background: var(--bubble);
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.45;
            position: relative;
        }
        .own .msg-bubble { background: var(--bubble-own); border-bottom-right-radius: 6px; }
        .msg-bubble .sender { font-size: 12px; color: var(--accent); font-weight: 700; margin-bottom: 3px; }
        .msg-bubble img { max-width: 240px; border-radius: 10px; margin: 4px 0; cursor: pointer; }
        .msg-bubble audio { max-width: 200px; margin-top: 3px; height: 36px; }
        .msg-time { font-size: 10px; color: var(--muted); text-align: right; margin-top: 3px; }
        .msg-delete {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 22px; height: 22px;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .msg-wrapper:hover .msg-delete { display: flex; }

        /* Poll */
        .poll-container {
            background: var(--bg-panel);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin: 6px 0;
            max-width: 350px;
            position: relative;
            z-index: 1;
        }
        .poll-question { font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .poll-option {
            padding: 8px 12px;
            margin: 4px 0;
            background: var(--bubble);
            border-radius: 8px;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .poll-option:hover { background: var(--accent); }
        .poll-option.voted { background: var(--accent); }
        .poll-bar {
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }
        .poll-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }

        /* Typing */
        .typing-area { padding: 4px 16px; display: flex; align-items: center; gap: 8px; min-height: 26px; position: relative; z-index: 1; }
        .typing-avatar { display: none; }
        .typing-text { color: var(--accent); font-size: 13px; display: none; }

        /* Input Area */
        .input-area {
            padding: 8px 12px 12px;
            background: var(--bg-panel);
            display: flex;
            gap: 6px;
            align-items: flex-end;
            border-top: 1px solid rgba(255,255,255,0.05);
            position: relative;
            z-index: 1;
        }
        .input-area input[type="text"] {
            flex: 1;
            padding: 10px 16px;
            border-radius: 22px;
            border: none;
            background: var(--bg-input);
            color: var(--text);
            outline: none;
            font-size: 15px;
            min-width: 0;
            transition: all var(--transition);
        }
        .input-area input[type="text"]:focus { background: #2a2a38; }
        .input-area .icon-btn { width: 36px; height: 36px; font-size: 18px; }
        .send-btn { background: var(--accent) !important; color: #fff !important; border-radius: 50% !important; }
        .send-btn:hover { background: var(--accent-hover) !important; }
        #file-input, #avatar-upload, #bg-upload { display: none; }

        /* Modals */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }
        .modal.show { opacity: 1; pointer-events: auto; }
        .modal-dialog {
            background: var(--bg-panel);
            padding: 22px;
            border-radius: var(--radius);
            width: 420px;
            max-width: 92%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            animation: fadeInUp 0.35s ease;
        }
        .modal-dialog h3 { margin-bottom: 16px; font-size: 19px; }
        .modal-dialog input, .modal-dialog textarea, .modal-dialog select {
            width: 100%;
            padding: 11px 13px;
            margin-bottom: 10px;
            background: var(--bg-input);
            border: none;
            color: var(--text);
            border-radius: var(--radius-sm);
            outline: 2px solid transparent;
            transition: all var(--transition);
            font-size: 14px;
            resize: vertical;
        }
        .modal-dialog input:focus, .modal-dialog textarea:focus, .modal-dialog select:focus { outline-color: var(--accent); }
        .modal-dialog button {
            padding: 11px 16px;
            border: none;
            color: #fff;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-bottom: 6px;
            font-size: 14px;
            transition: all var(--transition);
        }
        .modal-dialog button:hover { opacity: 0.9; }
        .btn-danger { background: var(--red); }
        .btn-warning { background: var(--yellow); color: #000; }

        /* Settings */
        .settings-section { margin-bottom: 16px; }
        .settings-section h4 { font-size: 14px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .switch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }
        .switch {
            position: relative;
            width: 48px; height: 26px;
            background: #444;
            border-radius: 13px;
            cursor: pointer;
            transition: background var(--transition);
        }
        .switch.on { background: var(--accent); }
        .switch::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px;
            width: 20px; height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: transform var(--transition);
        }
        .switch.on::after { transform: translateX(22px); }
        
        /* Theme grid */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        .theme-item {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .theme-item:hover { transform: scale(1.05); }
        .theme-item.selected { border-color: var(--accent); }
        .theme-item.custom {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px dashed var(--muted);
        }

        /* Members Picker */
        .members-picker { max-height: 220px; overflow-y: auto; margin-bottom: 12px; }
        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: background var(--transition);
        }
        .member-item:hover { background: rgba(255,255,255,0.04); }
        .member-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
        .member-item label { cursor: pointer; flex: 1; font-size: 14px; }

        /* Video Call */
        .video-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 12px 0; }
        video {
            background: #000;
            border-radius: 10px;
            width: 140px;
            max-width: 45%;
            aspect-ratio: 4/3;
            object-fit: cover;
        }
        .call-controls { display: flex; gap: 10px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
        .call-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .call-btn:hover { transform: scale(1.1); }
        .call-btn.end { background: var(--red); color: #fff; }
        .call-btn.mute { background: #444; color: #fff; }
        .call-btn.mute.muted { background: var(--red); }
        .call-btn.camera-off { background: #444; color: #fff; }

        /* Mobile */
        @media (max-width: 700px) {
            .sidebar {
                position: absolute;
                width: 100%;
                min-width: 100%;
                height: 100%;
            }
            .sidebar.hidden { transform: translateX(-100%); }
            .back-btn { display: block; }
            .chat-area { width: 100%; }
            .msg-bubble { max-width: 85%; }
            video { width: 45%; max-width: 150px; }
            .theme-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Auth Screen -->
    <div id="auth-screen">
        <div class="auth-box">
            <h2>🐱 Catogram</h2>
            <div id="auth-error" class="error-text"></div>
            <div class="input-group">
                <input type="text" id="auth-login" placeholder="Логин" autocomplete="username">
            </div>
            <div class="input-group">
                <input type="text" id="auth-username" placeholder="@username" oninput="checkUsername()">
                <span class="status-msg" id="username-status"></span>
            </div>
            <div class="input-group">
                <input type="password" id="auth-pass" placeholder="Пароль (мин. 4 символа)" autocomplete="current-password">
            </div>
            <button class="btn btn-primary ripple" onclick="handleLogin()">🔑 Войти</button>
            <button class="btn btn-secondary ripple" onclick="handleRegister()">✨ Регистрация</button>
        </div>
    </div>

    <!-- App Screen -->
    <div id="app-screen">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-info" onclick="openModal('settings-modal')">
                    <div class="avatar avatar-sm" id="my-avatar-header">🐱</div>
                    <div>
                        <div style="font-weight:600;font-size:14px;" id="my-name-header">...</div>
                        <div style="font-size:11px;color:var(--muted);">Настройки</div>
                    </div>
                </div>
                <button class="icon-btn" onclick="openGroupModal()" title="Создать группу">👥</button>
            </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // === GLOBALS ===
        let me = null;
        let socket = null;
        let allUsers = [];
        let allGroups = [];
        let allPolls = {};
        let messagesData = [];
        let currentChat = { id: 'global', type: 'global', name: 'Общий чат' };
        let currentTab = 'all';
        let typingTimeout;
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let favorites = JSON.parse(localStorage.getItem('catogram_favorites') || '[]');
        
        // WebRTC
        let localStream = null;
        let screenStream = null;
        let peerConnections = {};
        let activeCall = { active: false, isGroup: false, groupId: null, targetUser: null, audioOnly: false };
        let facingMode = 'user';
        let callSoundInterval = null;

        const iceServers = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
            ] 
        };

        // === NOTIFICATIONS & PUSH ===
        // Запрос разрешения
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
        
        // Регистрация Service Worker для Push
        if ('serviceWorker' in navigator && 'PushManager' in window) {
            navigator.serviceWorker.register('/sw.js').then(sw => {
                console.log('✅ Service Worker зарегистрирован');
            }).catch(err => console.log('SW не зарегистрирован:', err));
        }

        // Вибрация (для мобильных)
        function vibrate(pattern = [200, 100, 200]) {
            if (navigator.vibrate) {
                navigator.vibrate(pattern);
            }
        }

        // Звук уведомления
        function playNotificationSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(1000, ctx.currentTime + 0.1);
                osc.frequency.linearRampToValueAtTime(600, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.3);
            } catch(e) {}
        }
        
        // Звук звонка
        function playRingSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const playBeep = (freq, startTime, duration) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(freq, startTime);
                    gain.gain.setValueAtTime(0.15, startTime);
                    gain.gain.linearRampToValueAtTime(0, startTime + duration);
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                };
                for (let i = 0; i < 4; i++) {
                    playBeep(900, ctx.currentTime + i * 0.5, 0.25);
                    playBeep(700, ctx.currentTime + i * 0.5 + 0.25, 0.25);
                }
            } catch(e) {}
        }

        function sendBrowserNotification(title, body, tag = 'catogram-msg') {
            if (Notification.permission === 'granted' && document.hidden) {
                const notif = new Notification(title, {
                    body,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🐱</text></svg>',
                    tag,
                    vibrate: [200, 100, 200, 100, 200],
                    requireInteraction: false
                });
                notif.onclick = () => {
                    window.focus();
                    notif.close();
                };
            }
            playNotificationSound();
            vibrate();
        }

        // === INIT ===
        window.onload = checkAuth;
        loadTheme();
        
        document.addEventListener('focusin', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                document.body.classList.add('keyboard-open');
            }
        });
        document.addEventListener('focusout', () => {
            document.body.classList.remove('keyboard-open');
        });

        // === TOAST ===
        function showToast(text, duration = 2500) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = text;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // === THEME ===
        const themes = {
            default: { bg: '#121214', bubble: '#2a2a3c', bubbleOwn: '#4a4a6a', accent: '#7c8cf8', chatBg: '#121214', chatBgImage: 'none' },
            midnight: { bg: '#1a1a2e', bubble: '#16213e', bubbleOwn: '#0f3460', accent: '#e94560', chatBg: '#1a1a2e', chatBgImage: 'none' },
            github: { bg: '#0d1117', bubble: '#21262d', bubbleOwn: '#388bfd', accent: '#58a6ff', chatBg: '#0d1117', chatBgImage: 'none' },
            vscode: { bg: '#1e1e1e', bubble: '#2d2d2d', bubbleOwn: '#264f78', accent: '#007acc', chatBg: '#1e1e1e', chatBgImage: 'none' },
            purple: { bg: '#2d1b2e', bubble: '#3d2b4a', bubbleOwn: '#6b3fa0', accent: '#bb86fc', chatBg: '#2d1b2e', chatBgImage: 'none' },
            forest: { bg: '#1b2e1b', bubble: '#2d3a1f', bubbleOwn: '#4a7c3f', accent: '#81c784', chatBg: '#1b2e1b', chatBgImage: 'none' },
            sunset: { bg: '#2e1b1b', bubble: '#4a2a2a', bubbleOwn: '#c0392b', accent: '#e74c3c', chatBg: '#2e1b1b', chatBgImage: 'none' },
            ocean: { bg: '#1b2b3e', bubble: '#1e3a5f', bubbleOwn: '#2e86c1', accent: '#3498db', chatBg: '#1b2b3e', chatBgImage: 'none' }
        };
        let currentTheme = localStorage.getItem('catogram_theme') || 'default';

        function selectTheme(name) {
            currentTheme = name;
            if (name === 'custom') return; // handled by file upload
            applyTheme(name, themes[name]);
            localStorage.setItem('catogram_theme', name);
            document.querySelectorAll('.theme-item').forEach(el => el.classList.remove('selected'));
            const themeItems = document.querySelectorAll('.theme-item');
            const themeNames = Object.keys(themes);
            const idx = themeNames.indexOf(name);
            if (idx >= 0 && themeItems[idx]) themeItems[idx].classList.add('selected');
            showToast('Тема обновлена! 🎨');
        }

        function applyTheme(name, theme) {
            const root = document.documentElement.style;
            root.setProperty('--bg', theme.bg);
            root.setProperty('--bubble', theme.bubble);
            root.setProperty('--bubble-own', theme.bubbleOwn);
            root.setProperty('--accent', theme.accent);
            root.setProperty('--chat-bg', theme.chatBg);
            root.setProperty('--chat-bg-image', theme.chatBgImage || 'none');
            root.setProperty('--chat-bg-opacity', theme.chatBgImage ? '0.15' : '1');
        }

        function loadTheme() {
            const saved = localStorage.getItem('catogram_theme') || 'default';
            const customBg = localStorage.getItem('catogram_custom_bg');
            if (saved === 'custom' && customBg) {
                applyCustomBg(customBg);
            } else if (themes[saved]) {
                applyTheme(saved, themes[saved]);
            }
            currentTheme = saved;
        }

        function handleBgUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                applyCustomBg(e.target.result);
                currentTheme = 'custom';
                localStorage.setItem('catogram_theme', 'custom');
                localStorage.setItem('catogram_custom_bg', e.target.result);
                showToast('Фон чата обновлён! 🖼️');
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function applyCustomBg(dataUrl) {
            const root = document.documentElement.style;
            root.setProperty('--chat-bg', '#121214');
            root.setProperty('--chat-bg-image', `url(${dataUrl})`);
            root.setProperty('--chat-bg-size', 'cover');
            root.setProperty('--chat-bg-position', 'center');
            root.setProperty('--chat-bg-opacity', '1');
            document.querySelectorAll('.theme-item').forEach(el => el.classList.remove('selected'));
            const customEl = document.querySelector('.theme-item.custom');
            if (customEl) customEl.classList.add('selected');
        }

        // === API ===
        async function api(url, method = 'GET', body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            return await res.json();
        }

        function showError(text) {
            const el = document.getElementById('auth-error');
            el.innerText = text;
            setTimeout(() => el.innerText = '', 4000);
        }

        async function checkUsername() {
            const username = document.getElementById('auth-username').value.trim().replace(/^@/, '');
            const status = document.getElementById('username-status');
            if (username.length < 3) { status.style.display = 'none'; return; }
            const res = await api(`/api/check-username?username=${username}`);
            status.style.display = 'block';
            status.textContent = res.available ? '✅' : '❌';
            status.style.color = res.available ? 'var(--green)' : 'var(--red)';
        }

        async function handleRegister() {
            const login = document.getElementById('auth-login').value.trim();
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-pass').value;
            if (password.length < 4) return showError('Пароль минимум 4 символа');
            const res = await api('/api/register', 'POST', { login, username, password });
            if (res.error) showError(res.error);
            else if (res.success) initApp(res.user);
        }

        async function handleLogin() {
            const login = document.getElementById('auth-login').value.trim();
            const password = document.getElementById('auth-pass').value;
            const res = await api('/api/login', 'POST', { login, password });
            if (res.error) showError(res.error);
            else if (res.success) initApp(res.user);
        }

        async function checkAuth() {
            const res = await api('/api/me');
            if (res.success) initApp(res.user);
        }

        async function logout() {
            await api('/api/logout', 'POST');
            location.reload();
        }

        // === APP INIT ===
        function initApp(user) {
            me = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            
            updateMyUI();
            
            socket = io({ transports: ['websocket', 'polling'] });
            
            socket.on('connect', () => {
                console.log('🟢 Socket подключен');
            });
            
            socket.on('users_list', (data) => {
                allUsers = data.users;
                allGroups = data.groups;
                allPolls = data.polls || {};
                renderSidebar();
                updateChatStatus();
                if (currentChat.type === 'group') {
                    document.getElementById('group-call-btn').style.display = 'inline-flex';
                }
            });
            
            socket.on('history', (msgs) => {
                messagesData = msgs;
                renderMessages();
                scrollToBottom();
            });

            socket.on('new_message', (msg) => {
                messagesData.push(msg);
                if (shouldShowMessage(msg)) { 
                    renderMessages(); 
                    scrollToBottom(); 
                } else {
                    // Уведомление для сообщений из других чатов
                    const sender = allUsers.find(u => u.login === msg.from);
                    const senderName = sender ? sender.username : msg.from;
                    const chatName = getChatName(msg.to);
                    sendBrowserNotification(
                        `${chatName} 🐱`,
                        `${senderName}: ${msg.text ? msg.text.substring(0, 100) : '📎 Файл'}`
                    );
                }
                renderSidebar();
            });

            socket.on('message_deleted', (msgId) => {
                messagesData = messagesData.filter(m => m.id !== msgId);
                renderMessages();
            });

            socket.on('user_typing', (data) => {
                if (currentChat.id === data.to || (currentChat.type === 'user' && data.from === currentChat.id)) {
                    showTyping(data);
                }
            });

            socket.on('new_poll', (poll) => {
                allPolls[poll.id] = poll;
                renderMessages();
            });
            socket.on('poll_updated', (poll) => {
                allPolls[poll.id] = poll;
                renderMessages();
            });

            socket.on('user_kicked', (data) => {
                if (data.login === me.login && currentChat.id === data.groupId) {
                    selectChat('global', 'global', 'Общий чат');
                    showToast('Вас исключили из группы');
                }
                renderSidebar();
            });

            // WebRTC handlers
            socket.on('incoming_call', async (data) => {
                activeCall = { active: true, isGroup: false, targetUser: data.from, audioOnly: data.audioOnly };
                document.getElementById('call-status').innerText = `${data.caller?.username || data.from} звонит${data.audioOnly ? ' (аудио)' : ''}...`;
                document.getElementById('answer-btn').style.display = 'inline-block';
                document.getElementById('call-modal').classList.add('show');
                await initLocalStream(!data.audioOnly);
                createPeerConnection('remote');
                if (data.signal) {
                    await peerConnections['remote'].setRemoteDescription(new RTCSessionDescription(data.signal));
                    const answer = await peerConnections['remote'].createAnswer();
                    await peerConnections['remote'].setLocalDescription(answer);
                    socket.emit('accept_call', { to: data.from, signal: answer });
                }
                playRingSound();
                vibrate([500, 200, 500, 200, 500]);
                sendBrowserNotification('📞 Входящий звонок!', `${data.caller?.username || data.from} звонит вам`, 'catogram-call');
            });

            socket.on('call_accepted', (data) => {
                document.getElementById('call-status').innerText = 'Разговор...';
                document.getElementById('answer-btn').style.display = 'none';
                if (peerConnections['remote'] && data.signal) {
                    peerConnections['remote'].setRemoteDescription(new RTCSessionDescription(data.signal)).catch(e => console.error(e));
                }
            });

            socket.on('group_call_started', (data) => {
                if (currentChat.id === data.groupId) {
                    showToast(`${data.from} начал групповой звонок`);
                }
            });

            socket.on('new_peer', (data) => {
                if (activeCall.isGroup) {
                    createPeerConnection(data.peerId);
                    if (peerConnections[data.peerId]) {
                        peerConnections[data.peerId].createOffer().then(offer => {
                            peerConnections[data.peerId].setLocalDescription(offer);
                            socket.emit('group_call_signal', { to: data.peerId, signal: offer });
                        }).catch(e => console.error(e));
                    }
                }
            });

            socket.on('group_call_signal', async (data) => {
                if (!peerConnections[data.from]) {
                    createPeerConnection(data.from);
                }
                const pc = peerConnections[data.from];
                if (pc) {
                    try {
                        if (data.signal.type === 'offer') {
                            await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
                            const answer = await pc.createAnswer();
                            await pc.setLocalDescription(answer);
                            socket.emit('group_call_signal', { to: data.from, signal: answer });
                        } else if (data.signal.type === 'answer') {
                            await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
                        }
                    } catch(e) { console.error(e); }
                }
            });

            socket.on('peer_left', (data) => {
                if (peerConnections[data.peerId]) {
                    peerConnections[data.peerId].close();
                    delete peerConnections[data.peerId];
                }
                removeVideoElement(data.peerId);
            });

            socket.on('ice_candidate', (data) => {
                const pc = peerConnections['remote'] || peerConnections[data.from];
                if (pc && data.candidate) {
                    pc.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(e => console.error(e));
                }
            });

            socket.on('call_ended', () => cleanupCall());
        }

        function formatLastSeen(timestamp) {
            const lastSeen = new Date(timestamp);
            const now = new Date();
            const diffSec = Math.floor((now - lastSeen) / 1000);
            const diffMin = Math.floor(diffSec / 60);
            const diffHour = Math.floor(diffMin / 60);
            const diffDay = Math.floor(diffHour / 24);
            
            if (diffSec < 60) return 'только что';
            if (diffMin < 60) return `${diffMin} мин. назад`;
            if (diffHour < 6) return `${diffHour} ч. назад`;
            if (diffHour < 24) return `сегодня в ${lastSeen.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
            if (diffDay === 1) return `вчера в ${lastSeen.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
            return lastSeen.toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
        }

        // === VOICE RECORDING ===
        async function toggleVoiceRecord() {
            const btn = document.getElementById('voice-btn');
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunks, { type:'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            socket.emit('send_message', { to: currentChat.id, text:'🎤 Голосовое', type:'voice', fileData:e.target.result });
                        };
                        reader.readAsDataURL(blob);
                        stream.getTracks().forEach(t => t.stop());
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    btn.classList.add('recording');
                    btn.style.color = 'var(--red)';
                    btn.textContent = '⏹';
                } catch(e) { showToast('Нет доступа к микрофону'); }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('recording');
                btn.style.color = '';
                btn.textContent = '🎤';
            }
        }

        // === CALLS (ИСПРАВЛЕННЫЕ) ===
        async function initLocalStream(withVideo = true) {
            if (localStream) return;
            try {
                const constraints = { audio: true, video: withVideo ? { facingMode, width: { ideal: 640 }, height: { ideal: 480 } } : false };
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                const localVideoEl = document.getElementById('local-video');
                if (localVideoEl) localVideoEl.srcObject = localStream;
            } catch(e) {
                console.error('Ошибка доступа к медиа:', e);
                if (withVideo) {
                    showToast('Нет доступа к камере, только аудио');
                    await initLocalStream(false);
                } else {
                    showToast('Нет доступа к микрофону');
                }
            }
        }

        function createPeerConnection(peerId) {
            const pc = new RTCPeerConnection(iceServers);
            
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    pc.addTrack(track, localStream);
                });
            }
            if (screenStream) {
                screenStream.getTracks().forEach(track => pc.addTrack(track, screenStream));
            }
            
            pc.ontrack = (event) => {
                console.log('📥 Получен трек от', peerId);
                if (peerId === 'remote') {
                    const remoteVideoEl = document.getElementById('remote-video');
                    if (remoteVideoEl && event.streams[0]) {
                        remoteVideoEl.srcObject = event.streams[0];
                    }
                } else {
                    let videoEl = document.getElementById(`video-${peerId}`);
                    if (!videoEl) {
                        videoEl = document.createElement('video');
                        videoEl.id = `video-${peerId}`;
                        videoEl.autoplay = true;
                        videoEl.playsInline = true;
                        document.getElementById('video-grid').appendChild(videoEl);
                    }
                    if (event.streams[0]) {
                        videoEl.srcObject = event.streams[0];
                    }
                }
            };
            
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    const target = activeCall.isGroup ? peerId : activeCall.targetUser;
                    console.log('🧊 Отправка ICE кандидата к', target);
                    socket.emit('ice_candidate', { to: target, candidate: event.candidate });
                }
            };
            
            pc.oniceconnectionstatechange = () => {
                console.log(`ICE статус [${peerId}]:`, pc.iceConnectionState);
                if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                    console.log('⚠️ Соединение разорвано');
                }
            };
            
            pc.onconnectionstatechange = () => {
                console.log(`Состояние соединения [${peerId}]:`, pc.connectionState);
            };
            
            peerConnections[peerId] = pc;
            return pc;
        }

        async function initiateCall(audioOnly = false) {

            await initLocalStream(!audioOnly);

            try {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                console.log('📤 Отправка оффера');
                socket.emit('call_user', { 
                    userToCall: activeCall.targetUser, 
                    signalData: offer, 
                    audioOnly,
                    caller: { username: me.username, login: me.login }
                });
            } catch(e) {
                console.error('Ошибка создания оффера:', e);

                showToast('Ошибка звонка: ' + e.message);

        async function switchCamera() {
            facingMode = facingMode === 'user' ? 'environment' : 'user';
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
                await initLocalStream(true);
                Object.values(peerConnections).forEach(pc => {
                    if (pc.connectionState !== 'closed') {
                        const senders = pc.getSenders();
                        localStream.getTracks().forEach(track => {
                            const sender = senders.find(s => s.track?.kind === track.kind);
                            if (sender) sender.replaceTrack(track);
                            else pc.addTrack(track, localStream);
                        });
                    }
                });
                document.getElementById('local-video').srcObject = localStream;
            }
        }

        async function toggleScreenShare() {
            if (screenStream) {
                screenStream.getTracks().forEach(t => t.stop());
                screenStream = null;
                document.getElementById('screen-share-btn').style.background = '#444';
                return;
            }
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                Object.values(peerConnections).forEach(pc => {
                    if (pc.connectionState !== 'closed') {
                        screenStream.getTracks().forEach(track => pc.addTrack(track, screenStream));
                    }
                });
                document.getElementById('screen-share-btn').style.background = 'var(--accent)';
                screenStream.getVideoTracks()[0].onended = () => {
                    screenStream = null;
                    document.getElementById('screen-share-btn').style.background = '#444';
                };
            } catch(e) { showToast('Не удалось начать трансляцию'); }
        }

        function endCall() {
            if (activeCall.isGroup) {
                socket.emit('leave_group_call', { groupId: activeCall.groupId });
            } else if (activeCall.targetUser) {
                socket.emit('end_call', activeCall.targetUser);
            }
            cleanupCall();
        }

        function cleanupCall() {
            closeModal('call-modal');
            Object.values(peerConnections).forEach(pc => {
                try { pc.close(); } catch(e) {}
            });
            peerConnections = {};
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
            const localVideoEl = document.getElementById('local-video');
            const remoteVideoEl = document.getElementById('remote-video');
            if (localVideoEl) localVideoEl.srcObject = null;
            if (remoteVideoEl) remoteVideoEl.srcObject = null;
            document.querySelectorAll('#video-grid video:not(#local-video):not(#remote-video)').forEach(el => el.remove());
            activeCall = { active: false, isGroup: false, groupId: null, targetUser: null, audioOnly: false };
            document.getElementById('mute-btn').classList.remove('muted');
            document.getElementById('mute-btn').textContent = '🎤';
            document.getElementById('camera-btn').textContent = '📷';
            document.getElementById('screen-share-btn').style.background = '#444';
        }

        // === MODALS ===
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    </script>
</body>
