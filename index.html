<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐱 Catogram</title>
    <style>
        :root {
            --bg: #1e1e2f;
            --bg-panel: #252538;
            --bubble: #2a2a3c;
            --bubble-own: #4a4a6a;
            --accent: #7289da;
            --green: #55c27e;
            --red: #ff5555;
            --text: #ffffff;
            --muted: #a0a0b5;
            --shadow: 0 4px 15px rgba(0,0,0,0.5);
            --radius: 15px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* Анимации */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes recording { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .fade-in { animation: fadeIn 0.3s ease; }
        .slide-in { animation: slideIn 0.3s ease; }
        .recording { animation: recording 1.5s infinite; }

        /* Auth */
        #auth-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: var(--bg); z-index: 100; flex-direction: column; }
        .auth-box { background: var(--bg-panel); padding: 40px; border-radius: 20px; width: 380px; box-shadow: var(--shadow); text-align: center; }
        .auth-box h2 { margin-bottom: 25px; color: var(--accent); font-size: 32px; }
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group input { width: 100%; padding: 14px 15px; border: none; border-radius: 10px; background: var(--bubble); color: var(--text); outline: 2px solid transparent; transition: outline 0.3s; font-size: 15px; }
        .input-group input:focus { outline: 2px solid var(--accent); }
        .status-msg { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; display: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: 600; margin-bottom: 10px; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--bubble-own); color: white; }
        .error-text { color: var(--red); font-size: 0.9em; min-height: 20px; margin: 5px 0; }

        /* App */
        #app-screen { display: none; width: 100%; height: 100%; }
        
        /* Sidebar */
        .sidebar { width: 340px; background: var(--bg-panel); display: flex; flex-direction: column; border-right: 1px solid #151522; z-index: 10; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #1a1a28; }
        .user-info { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: white; overflow: hidden; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .search-box { padding: 10px; position: relative; }
        .search-box input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 25px; border: none; background: var(--bubble); color: var(--text); outline: none; font-size: 14px; }
        .search-box .icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--muted); }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; margin: 0 8px 2px; border-radius: 12px; transition: all 0.2s; }
        .chat-item:hover { background: var(--bubble); }
        .chat-item.active { background: var(--accent); }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-sub { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .online { background: var(--green); }
        .offline { background: #555; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .chat-header { padding: 12px 20px; background: var(--bg-panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #151522; min-height: 65px; }
        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn { display: none; background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; margin-right: 8px; }
        .messages-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
        .msg-wrapper { display: flex; flex-direction: column; animation: fadeIn 0.2s ease; }
        .msg-wrapper.own { align-items: flex-end; }
        .msg-bubble { max-width: 75%; padding: 10px 16px; border-radius: 18px; background: var(--bubble); word-wrap: break-word; font-size: 15px; line-height: 1.45; }
        .own .msg-bubble { background: var(--bubble-own); border-bottom-right-radius: 4px; }
        .msg-bubble .sender { font-size: 0.85em; color: var(--accent); font-weight: bold; margin-bottom: 4px; }
        .msg-bubble img { max-width: 250px; border-radius: 10px; margin: 5px 0; cursor: pointer; }
        .msg-bubble audio { margin-top: 5px; }
        .msg-time { font-size: 0.7em; color: var(--muted); text-align: right; margin-top: 4px; }
        .typing-area { padding: 5px 20px; display: flex; align-items: center; gap: 8px; min-height: 30px; }
        .typing-area .typing-avatar { width: 28px; height: 28px; border-radius: 50%; margin-right: 4px; display: none; }
        .typing-text { color: var(--accent); font-size: 0.9em; display: none; }
        .input-area { padding: 10px 15px 15px; background: var(--bg-panel); display: flex; gap: 8px; align-items: center; }
        .input-area button { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; padding: 8px; transition: color 0.2s; }
        .input-area button:hover { color: var(--accent); }
        .input-area input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: var(--bubble); color: var(--text); outline: none; font-size: 15px; }
        .send-btn { background: var(--accent) !important; border: none; color: white !important; width: 42px; height: 42px; border-radius: 50% !important; font-size: 18px !important; display: flex; align-items: center; justify-content: center; }
        .send-btn:hover { background: #5a6fc7 !important; color: white !important; }

        /* Modals */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(5px); }
        .modal.show { display: flex; }
        .modal-dialog { background: var(--bg-panel); padding: 25px; border-radius: 20px; width: 420px; max-width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.6); animation: slideIn 0.3s ease; }
        .modal-dialog h3 { margin-bottom: 20px; font-size: 20px; }
        .modal-dialog input, .modal-dialog textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: var(--bubble); border: none; color: var(--text); border-radius: 10px; outline: 2px solid transparent; transition: outline 0.3s; font-size: 14px; }
        .modal-dialog input:focus, .modal-dialog textarea:focus { outline: 2px solid var(--accent); }
        .modal-dialog button { padding: 12px 20px; border: none; color: white; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; margin-bottom: 8px; font-size: 15px; transition: all 0.2s; }
        .modal-dialog button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Members picker */
        .members-picker { max-height: 200px; overflow-y: auto; margin-bottom: 15px; }
        .member-item { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
        .member-item:hover { background: var(--bubble); }
        .member-item input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent); }
        .member-item label { cursor: pointer; flex: 1; }

        /* File upload */
        #file-input { display: none; }
        .file-preview { margin: 10px 0; display: flex; gap: 10px; align-items: center; }
        .file-preview img { max-width: 100px; border-radius: 10px; }

        /* Video call */
        video { background: #000; border-radius: 12px; width: 45%; max-width: 220px; aspect-ratio: 4/3; object-fit: cover; }

        @media (max-width: 600px) {
            .sidebar { position: absolute; width: 100%; height: 100%; }
            .sidebar.hidden { transform: translateX(-100%); }
            .back-btn { display: block; }
            .chat-area { width: 100%; }
            .auth-box { width: 90%; padding: 25px; }
            .msg-bubble img { max-width: 200px; }
        }
    </style>
</head>
<body>

    <!-- Auth -->
    <div id="auth-screen">
        <div class="auth-box fade-in">
            <h2>🐱 Catogram</h2>
            <div id="auth-error" class="error-text"></div>
            <div class="input-group">
                <input type="text" id="auth-login" placeholder="Логин" autocomplete="username">
            </div>
            <div class="input-group">
                <input type="text" id="auth-username" placeholder="@username" oninput="checkUsername()">
                <span class="status-msg" id="username-status"></span>
            </div>
            <div class="input-group">
                <input type="password" id="auth-pass" placeholder="Пароль (мин. 4 символа)" autocomplete="current-password">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">🔑 Войти</button>
            <button class="btn btn-secondary" onclick="handleRegister()">✨ Регистрация</button>
        </div>
    </div>

    <!-- App -->
    <div id="app-screen">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-info" onclick="openModal('settings-modal')">
                    <div class="avatar" id="my-avatar">🐱</div>
                    <div>
                        <div style="font-weight:600;" id="my-name">...</div>
                        <div style="font-size:12px; color:var(--muted);">Настройки</div>
                    </div>
                </div>
                <button class="btn-icon" onclick="openGroupModal()" title="Создать группу" style="background:none;border:none;color:white;font-size:22px;cursor:pointer;">👥</button>
            </div>
            <div class="search-box">
                <span class="icon">🔍</span>
                <input type="text" id="search-input" placeholder="Поиск..." oninput="filterChats()">
            </div>
            <div class="chat-list" id="chat-list"></div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-left">
                    <button class="back-btn" onclick="toggleSidebar()">←</button>
                    <div class="avatar" id="chat-avatar" style="width:40px;height:40px;font-size:18px;">🌍</div>
                    <div>
                        <div style="font-weight:600;font-size:16px;" id="chat-title">Общий чат</div>
                        <div style="font-size:13px;color:var(--muted);" id="chat-status">все участники</div>
                    </div>
                </div>
                <button id="call-btn" style="display:none;background:none;border:none;color:white;font-size:24px;cursor:pointer;" onclick="initiateCall()" title="Видеозвонок">📹</button>
            </div>
            <div class="messages-container" id="messages"></div>
            <div class="typing-area">
                <div class="typing-avatar avatar" id="typing-avatar"></div>
                <span class="typing-text" id="typing-text"></span>
            </div>
            <div class="input-area">
                <input type="file" id="file-input" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt" onchange="handleFileSelect(event)">
                <button onclick="document.getElementById('file-input').click()" title="Прикрепить файл">📎</button>
                <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="handleTyping(event)" onfocus="scrollToBottom()">
                <button id="voice-btn" onclick="toggleVoiceRecord()" title="Голосовое сообщение">🎤</button>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-dialog">
            <h3>⚙️ Настройки</h3>
            <div style="text-align:center;margin-bottom:15px;">
                <div class="avatar" id="settings-avatar" style="width:80px;height:80px;font-size:36px;margin:0 auto;cursor:pointer;" onclick="document.getElementById('avatar-upload').click()">🐱</div>
                <input type="file" id="avatar-upload" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)">
                <div style="font-size:12px;color:var(--muted);margin-top:5px;">Нажми на аватар чтобы изменить</div>
            </div>
            <input type="text" id="set-username" placeholder="@username">
            <input type="text" id="set-phone" placeholder="Телефон">
            <textarea id="set-bio" placeholder="О себе..." rows="3"></textarea>
            <button class="btn btn-primary" onclick="saveSettings()">💾 Сохранить</button>
            <button class="btn" style="background:var(--red);" onclick="logout()">🚪 Выйти</button>
            <button class="btn btn-secondary" onclick="closeModal('settings-modal')">Отмена</button>
        </div>
    </div>

    <!-- Group Modal -->
    <div class="modal" id="group-modal">
        <div class="modal-dialog">
            <h3>👥 Новая группа</h3>
            <input type="text" id="group-name" placeholder="Название группы">
            <div style="margin-bottom:10px;color:var(--muted);">Выбери участников:</div>
            <div class="members-picker" id="members-picker"></div>
            <button class="btn btn-primary" onclick="createGroup()">✨ Создать группу</button>
            <button class="btn btn-secondary" onclick="closeModal('group-modal')">Отмена</button>
        </div>
    </div>

    <!-- Call Modal -->
    <div class="modal" id="call-modal">
        <div class="modal-dialog" style="text-align:center;">
            <h3 id="call-status">Исходящий звонок...</h3>
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:15px 0;">
                <video id="local-video" autoplay muted playsinline></video>
                <video id="remote-video" autoplay playsinline></video>
            </div>
            <button id="answer-btn" class="btn btn-primary" style="background:var(--green);display:none;" onclick="acceptCall()">📞 Ответить</button>
            <button class="btn" style="background:var(--red);" onclick="endCall()">❌ Завершить</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let me = null;
        let socket = null;
        let allUsers = [];
        let allGroups = [];
        let messagesData = [];
        let currentChat = { id: 'global', type: 'global', name: 'Общий чат' };
        let typingTimeout;
        let activeCallUser = null;
        let peerConnection = null;
        let localStream = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        const iceServers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        window.onload = checkAuth;

        // === API ===
        async function api(url, method = 'GET', body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            return await res.json();
        }

        function showError(text) {
            const el = document.getElementById('auth-error');
            el.innerText = text;
            setTimeout(() => el.innerText = '', 4000);
        }

        async function checkUsername() {
            const username = document.getElementById('auth-username').value.trim().replace(/^@/, '');
            const status = document.getElementById('username-status');
            if (username.length < 3) { status.style.display = 'none'; return; }
            const res = await api(`/api/check-username?username=${username}`);
            status.style.display = 'block';
            status.textContent = res.available ? '✅' : '❌ Занят';
            status.style.color = res.available ? '#55c27e' : '#ff5555';
        }

        async function handleRegister() {
            const login = document.getElementById('auth-login').value.trim();
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-pass').value;
            if (password.length < 4) return showError('Пароль минимум 4 символа');
            const res = await api('/api/register', 'POST', { login, username, password });
            if (res.error) showError(res.error);
            else if (res.success) initApp(res.user);
        }

        async function handleLogin() {
            const login = document.getElementById('auth-login').value.trim();
            const password = document.getElementById('auth-pass').value;
            const res = await api('/api/login', 'POST', { login, password });
            if (res.error) showError(res.error);
            else if (res.success) initApp(res.user);
        }

        async function checkAuth() {
            const res = await api('/api/me');
            if (res.success) initApp(res.user);
        }

        async function logout() {
            await api('/api/logout', 'POST');
            location.reload();
        }

        // === Init ===
        function initApp(user) {
            me = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            
            updateMyUI();
            
            socket = io();
            
            socket.on('users_list', (data) => {
                allUsers = data.users;
                allGroups = data.groups;
                renderSidebar();
                updateChatStatus();
            });
            
            socket.on('history', (msgs) => {
                messagesData = msgs;
                renderMessages();
            });

            socket.on('new_message', (msg) => {
                messagesData.push(msg);
                const isRelevant = currentChat.id === msg.to || 
                    (currentChat.type === 'user' && 
                     ((msg.from === me.login && msg.to === currentChat.id) || 
                      (msg.from === currentChat.id && msg.to === me.login)));
                if (isRelevant) {
                    renderMessages();
                    scrollToBottom();
                }
                renderSidebar();
            });

            socket.on('user_typing', (data) => {
                if (currentChat.id === data.to || 
                    (currentChat.type === 'user' && data.from === currentChat.id)) {
                    const ava = document.getElementById('typing-avatar');
                    const txt = document.getElementById('typing-text');
                    const user = allUsers.find(u => u.login === data.from);
                    if (user) {
                        ava.innerText = user.avatar || user.username[0];
                        ava.style.display = 'flex';
                        txt.innerText = `${user.username} печатает...`;
                        txt.style.display = 'inline';
                    }
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => {
                        ava.style.display = 'none';
                        txt.style.display = 'none';
                    }, 2000);
                }
            });

            // WebRTC handlers
            socket.on('incoming_call', async (data) => {
                activeCallUser = data.from;
                document.getElementById('call-status').innerText = `${data.caller.username} звонит...`;
                document.getElementById('answer-btn').style.display = 'inline-block';
                openModal('call-modal');
                await initLocalStream();
                createPeerConnection();
                peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal));
            });

            socket.on('call_accepted', (signal) => {
                document.getElementById('call-status').innerText = 'Разговор...';
                if (peerConnection) peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
            });

            socket.on('ice_candidate', (data) => {
                if (peerConnection) peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            });

            socket.on('call_ended', () => cleanupCall());
        }

        function updateMyUI() {
            document.getElementById('my-name').innerText = me.username;
            updateAvatar('my-avatar', me.avatar, me.username);
            document.getElementById('set-username').value = '@' + me.username;
            document.getElementById('set-phone').value = me.phone || '';
            document.getElementById('set-bio').value = me.bio || '';
            updateAvatar('settings-avatar', me.avatar, me.username);
        }

        function updateAvatar(elementId, avatar, fallback) {
            const el = document.getElementById(elementId);
            if (avatar && avatar.startsWith('data:image')) {
                el.innerHTML = `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            } else {
                el.innerHTML = '';
                el.innerText = (avatar && avatar.length <= 3) ? avatar : (fallback || '👤')[0].toUpperCase();
            }
        }

        function updateChatStatus() {
            const status = document.getElementById('chat-status');
            if (currentChat.type === 'global') {
                const online = allUsers.filter(u => u.isOnline).length;
                status.innerText = `${online} онлайн · ${allUsers.length} всего`;
            } else if (currentChat.type === 'group') {
                const group = allGroups.find(g => g.id === currentChat.id);
                status.innerText = group ? `${group.members.length} участников` : '';
            } else {
                const user = allUsers.find(u => u.login === currentChat.id);
                if (user) {
                    if (user.isOnline) {
                        status.innerText = '🟢 В сети';
                    } else {
                        const lastSeen = new Date(user.lastSeen);
                        const now = new Date();
                        const diff = Math.floor((now - lastSeen) / 1000);
                        let timeAgo;
                        if (diff < 60) timeAgo = 'только что';
                        else if (diff < 3600) timeAgo = `${Math.floor(diff/60)} мин. назад`;
                        else if (diff < 86400) timeAgo = `${Math.floor(diff/3600)} ч. назад`;
                        else timeAgo = lastSeen.toLocaleDateString('ru-RU');
                        status.innerText = `Был(а) ${timeAgo}`;
                    }
                }
            }
        }

        // === Sidebar ===
        function renderSidebar(filter = '') {
            const list = document.getElementById('chat-list');
            const term = filter.toLowerCase();
            let html = `<div class="chat-item ${currentChat.id === 'global' ? 'active' : ''}" onclick="selectChat('global', 'global', 'Общий чат')">
                <div class="avatar">🌍</div>
                <div class="chat-info"><div class="chat-name">Общий чат</div><div class="chat-sub">Вся сеть</div></div>
            </div>`;
            
            allGroups.forEach(g => {
                if (term && !g.name.toLowerCase().includes(term)) return;
                html += `<div class="chat-item ${currentChat.id === g.id ? 'active' : ''}" onclick="selectChat('${g.id}', 'group', '${g.name}')">
                    <div class="avatar">👥</div>
                    <div class="chat-info"><div class="chat-name">${g.name}</div><div class="chat-sub">${g.members.length} уч.</div></div>
                </div>`;
            });
            
            const sorted = [...allUsers].filter(u => u.login !== me.login)
                .sort((a, b) => b.isOnline - a.isOnline);
            
            sorted.forEach(u => {
                if (term && !u.username.toLowerCase().includes(term) && !u.login.includes(term)) return;
                const dot = u.isOnline ? '🟢' : '⚫';
                const init = u.avatar || u.username[0];
                html += `<div class="chat-item ${currentChat.id === u.login ? 'active' : ''}" onclick="selectChat('${u.login}', 'user', '${u.username}')">
                    <div class="avatar">${init}</div>
                    <div class="chat-info"><div class="chat-name">${dot} ${u.username}</div><div class="chat-sub">@${u.login}${u.bio ? ' · '+u.bio : ''}</div></div>
                </div>`;
            });
            
            list.innerHTML = html;
        }

        function filterChats() {
            renderSidebar(document.getElementById('search-input').value);
        }

        function selectChat(id, type, name) {
            currentChat = { id, type, name };
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-avatar').innerText = type === 'global' ? '🌍' : type === 'group' ? '👥' : '👤';
            document.getElementById('call-btn').style.display = (type === 'user') ? 'inline-block' : 'none';
            renderSidebar();
            renderMessages();
            updateChatStatus();
            scrollToBottom();
            if (window.innerWidth <= 600) toggleSidebar();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        // === Messages ===
        function renderMessages() {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            const filtered = messagesData.filter(m => {
                if (currentChat.type === 'global') return m.to === 'global';
                if (currentChat.type === 'group') return m.to === currentChat.id;
                return (m.from === me.login && m.to === currentChat.id) || 
                       (m.from === currentChat.id && m.to === me.login);
            });
            
            filtered.forEach(m => {
                const isOwn = m.from === me.login;
                const time = new Date(m.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let content = '';
                
                if (m.type === 'image' && m.fileData) {
                    content = `<img src="${m.fileData}" style="max-width:250px;border-radius:10px;cursor:pointer;" onclick="window.open(this.src)">`;
                } else if (m.type === 'voice' && m.fileData) {
                    content = `<audio controls src="${m.fileData}" style="max-width:250px;"></audio>`;
                } else if (m.type === 'file' && m.fileData) {
                    content = `📎 <a href="${m.fileData}" download="${m.fileName}" style="color:#7289da;">${m.fileName}</a>`;
                } else {
                    content = m.text;
                }
                
                box.innerHTML += `<div class="msg-wrapper ${isOwn ? 'own' : ''} fade-in">
                    <div class="msg-bubble">
                        ${!isOwn ? `<div class="sender">${m.from}</div>` : ''}
                        ${content}
                        <div class="msg-time">${time}</div>
                    </div>
                </div>`;
            });
        }

        function scrollToBottom() {
            const box = document.getElementById('messages');
            setTimeout(() => box.scrollTop = box.scrollHeight, 100);
        }

        function sendMessage() {
            const inp = document.getElementById('msg-input');
            const text = inp.value.trim();
            if (!text) return;
            socket.emit('send_message', { to: currentChat.id, text, type: 'text' });
            inp.value = '';
            inp.focus();
            scrollToBottom();
        }

        function handleTyping(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
                return;
            }
            socket.emit('typing', currentChat.id);
        }

        // === File Upload ===
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) {
                alert('Файл слишком большой. Максимум 5MB.');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                let type = 'file';
                if (file.type.startsWith('image/')) type = 'image';
                else if (file.type.startsWith('audio/')) type = 'voice';
                
                socket.emit('send_message', {
                    to: currentChat.id,
                    text: file.name,
                    type: type,
                    fileData: e.target.result,
                    fileName: file.name,
                    fileSize: file.size
                });
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        // === Voice Recording ===
        async function toggleVoiceRecord() {
            const btn = document.getElementById('voice-btn');
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            socket.emit('send_message', {
                                to: currentChat.id,
                                text: '🎤 Голосовое сообщение',
                                type: 'voice',
                                fileData: e.target.result,
                                duration: audioChunks.length
                            });
                        };
                        reader.readAsDataURL(audioBlob);
                        stream.getTracks().forEach(t => t.stop());
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    btn.textContent = '⏹️';
                    btn.classList.add('recording');
                    btn.style.color = '#ff5555';
                } catch (e) {
                    alert('Нет доступа к микрофону');
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.textContent = '🎤';
                btn.classList.remove('recording');
                btn.style.color = '';
            }
        }

        // === Avatar Upload ===
        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                updateAvatar('settings-avatar', e.target.result, me.username);
                // Сохраняем сразу
                document.getElementById('set-username').value = '@' + me.username;
                api('/api/settings', 'POST', { avatar: e.target.result }).then(res => {
                    if (res.success) {
                        me = res.user;
                        updateMyUI();
                    }
                });
            };
            reader.readAsDataURL(file);
        }

        // === Settings ===
        async function saveSettings() {
            const username = document.getElementById('set-username').value.trim().replace(/^@/, '');
            const phone = document.getElementById('set-phone').value.trim();
            const bio = document.getElementById('set-bio').value.trim();
            
            const res = await api('/api/settings', 'POST', { username, phone, bio });
            if (res.success) {
                me = res.user;
                updateMyUI();
                closeModal('settings-modal');
                renderSidebar();
            } else {
                alert(res.error);
            }
        }

        // === Group ===
        async function openGroupModal() {
            const res = await api('/api/users');
            const picker = document.getElementById('members-picker');
            if (res.success) {
                picker.innerHTML = res.users.map(u => `
                    <div class="member-item">
                        <input type="checkbox" id="member-${u.login}" value="${u.login}">
                        <label for="member-${u.login}">
                            <div class="avatar" style="width:32px;height:32px;font-size:14px;display:inline-flex;vertical-align:middle;">${u.avatar || u.username[0]}</div>
                            <strong style="margin-left:8px;">${u.username}</strong>
                            <span style="color:var(--muted);margin-left:5px;">@${u.login}</span>
                        </label>
                    </div>
                `).join('');
            }
            openModal('group-modal');
        }

        function createGroup() {
            const name = document.getElementById('group-name').value.trim();
            if (!name) return alert('Введи название группы');
            const checkboxes = document.querySelectorAll('#members-picker input:checked');
            const members = Array.from(checkboxes).map(cb => cb.value);
            if (members.length === 0) return alert('Выбери хотя бы одного участника');
            
            socket.emit('create_group', { name, members });
            closeModal('group-modal');
            document.getElementById('group-name').value = '';
        }

        // === WebRTC ===
        async function initLocalStream() {
            if (localStream) return;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
            } catch (e) {
                alert('Нет доступа к камере или микрофону');
                throw e;
            }
        }

        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(iceServers);
            if (localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            }
            peerConnection.ontrack = (event) => {
                document.getElementById('remote-video').srcObject = event.streams[0];
            };
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && activeCallUser) {
                    socket.emit('ice_candidate', { to: activeCallUser, candidate: event.candidate });
                }
            };
        }

        async function initiateCall() {
            if (currentChat.type !== 'user') return;
            activeCallUser = currentChat.id;
            document.getElementById('call-status').innerText = `Звоним: ${currentChat.name}...`;
            document.getElementById('answer-btn').style.display = 'none';
            openModal('call-modal');
            await initLocalStream();
            createPeerConnection();
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('call_user', { userToCall: activeCallUser, signalData: offer });
        }

        async function acceptCall() {
            document.getElementById('answer-btn').style.display = 'none';
            document.getElementById('call-status').innerText = 'Соединение...';
            await initLocalStream();
            createPeerConnection();
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer_call', { to: activeCallUser, signal: answer });
        }

        function endCall() {
            if (activeCallUser) socket.emit('end_call', activeCallUser);
            cleanupCall();
        }

        function cleanupCall() {
            closeModal('call-modal');
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            document.getElementById('local-video').srcObject = null;
            document.getElementById('remote-video').srcObject = null;
            activeCallUser = null;
        }

        // === Modals ===
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    </script>
</body>
</html>
